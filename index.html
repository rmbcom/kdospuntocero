<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pulsador Kahoot</title>
    <style>
      :root {
        --bg: #020604;
        --panel: rgba(3, 18, 12, 0.9);
        --green: #39ff88;
        --cyan: #20e3ff;
        --amber: #ffd166;
        --red: #ff3864;
        --ink: #d9ffe7;
        --muted: #82b69a;
        --line: rgba(57, 255, 136, 0.32);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Courier New", Consolas, monospace;
        background: var(--bg);
        overflow-x: hidden;
      }

      #matrix {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.22;
        transition: opacity 140ms ease, filter 140ms ease;
      }

      body.matrix-correct #matrix,
      body.matrix-wrong #matrix {
        opacity: 1;
      }

      body.matrix-correct #matrix {
        filter: saturate(1.8) brightness(1.35);
      }

      body.matrix-wrong #matrix {
        filter: saturate(2.2) brightness(1.55);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: screen;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        z-index: 2;
      }

      body.matrix-wrong::before {
        animation: wrongFlash 2.25s ease-in-out;
      }

      body.matrix-correct::before {
        animation: correctPulse 2.25s ease-out;
      }

      @keyframes wrongFlash {
        0%, 100% { opacity: 0; background: rgba(255, 56, 100, 0); }
        10%, 34%, 58%, 82% { opacity: 0.62; background: rgba(255, 24, 64, 0.62); }
        22%, 46%, 70% { opacity: 0.24; background: rgba(80, 0, 16, 0.86); }
      }

      @keyframes correctPulse {
        0% {
          opacity: 0;
          background: radial-gradient(circle at center, rgba(32, 227, 255, 0.95), rgba(0, 74, 180, 0.44) 42%, rgba(0, 14, 42, 0.5) 72%);
          transform: scale(0.72);
        }
        28% {
          opacity: 0.68;
          background: radial-gradient(circle at center, rgba(32, 227, 255, 0.86), rgba(0, 89, 214, 0.48) 48%, rgba(0, 12, 36, 0.48) 76%);
          transform: scale(1);
        }
        100% {
          opacity: 0;
          background: radial-gradient(circle at center, rgba(32, 227, 255, 0), transparent 74%);
          transform: scale(1.18);
        }
      }

      main {
        position: relative;
        z-index: 3;
        width: min(920px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        place-items: center;
      }

      .panel {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(18px, 4vw, 34px);
        background: var(--panel);
        box-shadow: 0 0 36px rgba(57, 255, 136, 0.16), inset 0 0 28px rgba(57, 255, 136, 0.08);
      }

      body.matrix-correct .panel {
        border-color: rgba(32, 227, 255, 0.88);
        background: rgba(0, 28, 58, 0.78);
        box-shadow: 0 0 54px rgba(32, 227, 255, 0.48), inset 0 0 42px rgba(32, 227, 255, 0.2);
      }

      body.matrix-wrong .panel {
        border-color: rgba(255, 56, 100, 0.95);
        background: rgba(58, 0, 14, 0.78);
        box-shadow: 0 0 62px rgba(255, 56, 100, 0.58), inset 0 0 44px rgba(255, 56, 100, 0.24);
        animation: panelWrongPulse 2.25s ease-in-out;
      }

      @keyframes panelWrongPulse {
        0%, 100% { transform: none; }
        14%, 42%, 70% { transform: translateX(-3px); }
        28%, 56%, 84% { transform: translateX(3px); }
      }

      .hidden { display: none !important; }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        margin-bottom: 12px;
        color: var(--green);
        font-size: clamp(2.4rem, 9vw, 5.5rem);
        line-height: 0.9;
        text-shadow: 0 0 14px rgba(57, 255, 136, 0.5);
      }

      h2 {
        color: white;
        font-size: clamp(1.55rem, 5vw, 3rem);
        line-height: 1.08;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-weight: 900;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 15px;
        color: var(--green);
        background: #020b07;
        font: inherit;
        font-size: 1.25rem;
        font-weight: 900;
        outline: none;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 18px;
        color: var(--ink);
        background: rgba(57, 255, 136, 0.14);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
      }

      button:hover { transform: translateY(-2px); box-shadow: 0 0 18px rgba(57, 255, 136, 0.24); }
      button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

      .primary {
        width: 100%;
        margin-top: 16px;
        color: #001b0b;
        background: var(--green);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 22px;
      }

      .player-stats {
        display: flex;
        gap: 10px;
        align-items: stretch;
        position: sticky;
        top: 14px;
        z-index: 4;
      }

      .score,
      .rank {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 16px;
        color: var(--amber);
        background: linear-gradient(135deg, rgba(255, 209, 102, 0.18), rgba(57, 255, 136, 0.08));
        box-shadow: 0 0 22px rgba(255, 209, 102, 0.12);
        font-size: clamp(1.2rem, 4vw, 1.9rem);
        font-weight: 900;
        white-space: nowrap;
        min-width: 128px;
        text-align: center;
      }

      .rank {
        color: var(--cyan);
        background: linear-gradient(135deg, rgba(32, 227, 255, 0.16), rgba(57, 255, 136, 0.08));
        box-shadow: 0 0 22px rgba(32, 227, 255, 0.12);
        min-width: 110px;
      }

      .score::before,
      .rank::before {
        content: "MARCADOR";
        display: block;
        margin-bottom: 2px;
        color: var(--muted);
        font-size: 0.64rem;
        letter-spacing: 0;
      }

      .rank::before {
        content: "PUESTO";
      }

      .score.bump {
        animation: scoreBump 520ms ease;
      }

      @keyframes scoreBump {
        0% { transform: scale(1); box-shadow: 0 0 22px rgba(255, 209, 102, 0.12); }
        45% { transform: scale(1.08); box-shadow: 0 0 36px rgba(255, 209, 102, 0.42); }
        100% { transform: scale(1); box-shadow: 0 0 22px rgba(255, 209, 102, 0.12); }
      }

      .status {
        min-height: 1.5em;
        color: var(--cyan);
        font-weight: 900;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .question-media {
        margin: 16px 0 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0,0,0,.42);
        overflow: hidden;
        display: grid;
        place-items: center;
        max-height: 320px;
      }

      .question-media img {
        width: 100%;
        max-height: 320px;
        object-fit: contain;
        display: block;
      }

      .question-media.hidden { display: none; }

      .option {
        min-height: 96px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: white;
        text-align: left;
        font-size: clamp(1rem, 2.8vw, 1.24rem);
      }

      .option strong {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        color: #001b0b;
        background: white;
      }

      .a { background: rgba(255, 56, 100, 0.7); }
      .b { background: rgba(32, 227, 255, 0.62); }
      .c { background: rgba(255, 209, 102, 0.72); color: #101510; }
      .d { background: rgba(57, 255, 136, 0.54); }

      .selected {
        outline: 4px solid white;
        box-shadow: 0 0 28px rgba(255, 255, 255, 0.22);
      }

      .terminal {
        border-top: 1px dashed var(--line);
        margin-top: 20px;
        padding-top: 14px;
        color: var(--muted);
        font-weight: 800;
      }

      @media (max-width: 680px) {
        .options { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
        .player-stats { width: 100%; }
        .score, .rank { flex: 1; min-width: 0; }
      }
    </style>
  </head>
  <body>
    <canvas id="matrix"></canvas>

    <main>
      <section id="loginView" class="panel">
        <p class="eyebrow">SISTEMA DE CONCURSO ACTIVO</p>
        <h1>ACCESO</h1>
        <label>
          IDENTIFICADOR DE PARTICIPANTE
          <input id="usernameInput" maxlength="40" placeholder="Escribe tu nombre">
        </label>
        <button id="enterButton" class="primary">ENTRAR AL SISTEMA</button>
        <p id="loginError" class="status"></p>
      </section>

      <section id="gameView" class="panel hidden">
        <div class="topbar">
          <div>
            <p class="eyebrow" id="playerName">PARTICIPANTE</p>
            <h1 style="font-size: clamp(2rem, 7vw, 4rem)">QUIZ_MODE</h1>
          </div>
          <div class="player-stats">
            <div class="score" id="playerScore">0 PTS</div>
            <div class="rank" id="playerRank">#-</div>
          </div>
        </div>

        <section id="waitingPanel">
          <h2>ESPERANDO PREGUNTA...</h2>
          <p class="terminal">El moderador controla el flujo de la partida.</p>
        </section>

        <section id="questionPanel" class="hidden">
          <p class="eyebrow" id="questionMeta">PREGUNTA</p>
          <h2 id="questionText"></h2>
          <div class="question-media hidden" id="questionImageBox"><img id="questionImage" alt="Imagen de la pregunta"></div>
          <div class="options" id="options"></div>
          <p class="terminal" id="answerStatus">Selecciona una respuesta.</p>
        </section>

        <section id="finishedPanel" class="hidden">
          <h2>RANKING FINAL EN PANTALLA DEL MODERADOR</h2>
          <p class="terminal">Partida finalizada. Espera nuevas instrucciones.</p>
        </section>

        <button id="leaveButton" style="margin-top: 20px">SALIR / CAMBIAR NOMBRE</button>
      </section>
    </main>

    <script src="./questions.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        update,
        serverTimestamp,
        onDisconnect,
        onValue,
        get,
        runTransaction
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDWvS8aYd7tx3pc2kxZewJVlXH5xIPAgHM",
        authDomain: "pulsadorconcurso.firebaseapp.com",
        databaseURL: "https://pulsadorconcurso-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "pulsadorconcurso",
        storageBucket: "pulsadorconcurso.firebasestorage.app",
        messagingSenderId: "124348060991",
        appId: "1:124348060991:web:6dd54bbe290b1bfa61ef8a"
      };

      const ROOM_ID = "principal";
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const loginView = document.querySelector("#loginView");
      const gameView = document.querySelector("#gameView");
      const usernameInput = document.querySelector("#usernameInput");
      const enterButton = document.querySelector("#enterButton");
      const loginError = document.querySelector("#loginError");
      const playerName = document.querySelector("#playerName");
      const playerScore = document.querySelector("#playerScore");
      const playerRank = document.querySelector("#playerRank");
      const waitingPanel = document.querySelector("#waitingPanel");
      const questionPanel = document.querySelector("#questionPanel");
      const finishedPanel = document.querySelector("#finishedPanel");
      const questionMeta = document.querySelector("#questionMeta");
      const questionText = document.querySelector("#questionText");
      const questionImageBox = document.querySelector("#questionImageBox");
      const questionImage = document.querySelector("#questionImage");
      const options = document.querySelector("#options");
      const answerStatus = document.querySelector("#answerStatus");
      const leaveButton = document.querySelector("#leaveButton");

      let username = localStorage.getItem("buzzerUsername") || "";
      let playerId = localStorage.getItem("buzzerPlayerId") || crypto.randomUUID();
      let activeQuestionId = null;
      let currentQuestion = null;
      let audioCtx = null;
      let lastRenderedScore = null;
      let matrixFeedback = null;
      localStorage.setItem("buzzerPlayerId", playerId);

      function getAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }

      function tone(frequency, start, duration, type = "square", volume = 0.12) {
        const context = getAudio();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, context.currentTime + start);
        gain.gain.setValueAtTime(0.0001, context.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(volume, context.currentTime + start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + start + duration);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(context.currentTime + start);
        oscillator.stop(context.currentTime + start + duration + 0.02);
      }

      const sfx = {
        click() {
          tone(520, 0, 0.08, "square", 0.08);
        },
        enter() {
          tone(420, 0, 0.08, "square", 0.1);
          tone(740, 0.08, 0.11, "square", 0.1);
        },
        question() {
          tone(330, 0, 0.08, "sawtooth", 0.09);
          tone(440, 0.08, 0.08, "sawtooth", 0.09);
          tone(660, 0.16, 0.13, "sawtooth", 0.09);
        },
        answer() {
          tone(880, 0, 0.07, "square", 0.12);
          tone(1180, 0.08, 0.12, "square", 0.1);
        },
        blocked() {
          tone(180, 0, 0.18, "sawtooth", 0.11);
          tone(120, 0.14, 0.22, "sawtooth", 0.09);
        },
        finish() {
          tone(392, 0, 0.12, "triangle", 0.12);
          tone(523, 0.14, 0.12, "triangle", 0.12);
          tone(784, 0.3, 0.24, "triangle", 0.12);
        }
      };

      function playerRef() {
        return ref(db, `rooms/${ROOM_ID}/participants/${playerId}`);
      }

      function showGame() {
        loginView.classList.add("hidden");
        gameView.classList.remove("hidden");
        playerName.textContent = `USER: ${username}`;
      }

      function showLogin(message = "") {
        gameView.classList.add("hidden");
        loginView.classList.remove("hidden");
        usernameInput.value = "";
        loginError.textContent = message;
      }

      async function join() {
        username = usernameInput.value.trim();
        if (!username) {
          loginError.textContent = "Escribe un nombre.";
          return;
        }

        const previousPlayer = (await get(playerRef())).val();
        localStorage.setItem("buzzerUsername", username);

        await set(playerRef(), {
          id: playerId,
          name: username,
          active: true,
          score: Number(previousPlayer?.score) || 0,
          joinedAt: serverTimestamp(),
          lastSeenAt: serverTimestamp()
        });

        onDisconnect(playerRef()).update({
          active: false,
          leftAt: serverTimestamp()
        });

        sfx.enter();
        showGame();
      }

      function renderQuestion(question) {
        currentQuestion = question;
        activeQuestionId = question.id;
        waitingPanel.classList.add("hidden");
        finishedPanel.classList.add("hidden");
        questionPanel.classList.remove("hidden");
        questionMeta.textContent = `PREGUNTA ${question.index + 1}`;
        questionText.textContent = question.pregunta;
        questionImageBox.classList.toggle("hidden", !question.image);
        if (question.image) questionImage.src = question.image;
        answerStatus.textContent = "Selecciona una respuesta.";

        options.innerHTML = question.options.map((option) => `
          <button class="option ${option.key.toLowerCase()}" data-key="${option.key}">
            <strong>${option.key}</strong>
            <span>${option.text}</span>
          </button>
        `).join("");
        sfx.question();

        get(ref(db, `rooms/${ROOM_ID}/answers/${question.id}/${playerId}`)).then((snapshot) => {
          if (snapshot.exists()) {
            lockOptions(snapshot.val().optionKey);
            answerStatus.textContent = "RESPUESTA ENVIADA";
          }
        });
      }

      function lockOptions(selectedKey) {
        document.querySelectorAll(".option").forEach((button) => {
          button.disabled = true;
          button.classList.toggle("selected", button.dataset.key === selectedKey);
        });
      }

      function showAnswerFeedback(isCorrect) {
        const className = isCorrect ? "matrix-correct" : "matrix-wrong";
        matrixFeedback = {
          type: isCorrect ? "correct" : "wrong",
          until: Date.now() + 2200
        };
        document.body.classList.remove("matrix-correct", "matrix-wrong");
        void document.body.offsetWidth;
        document.body.classList.add(className);
        window.setTimeout(() => {
          if (matrixFeedback && matrixFeedback.until <= Date.now()) {
            matrixFeedback = null;
          }
          document.body.classList.remove(className);
        }, 2300);
      }

      async function answer(optionKey) {
        if (!currentQuestion || !username) return;
        const answerRef = ref(db, `rooms/${ROOM_ID}/answers/${currentQuestion.id}/${playerId}`);
        const answeredAt = Date.now();
        const result = await runTransaction(answerRef, (currentValue) => {
          if (currentValue !== null) return;
          return {
            playerId,
            name: username,
            optionKey,
            answeredAt
          };
        });

        if (result.committed) {
          lockOptions(optionKey);
          const isCorrect = optionKey === currentQuestion.correctKey;
          showAnswerFeedback(isCorrect);
          answerStatus.textContent = isCorrect ? "CORRECTO" : "INCORRECTO";
          sfx.answer();
        } else {
          answerStatus.textContent = "YA HABIAS RESPONDIDO";
          sfx.blocked();
        }
      }

      options.addEventListener("click", (event) => {
        const button = event.target.closest("[data-key]");
        if (button) answer(button.dataset.key);
      });

      enterButton.addEventListener("click", join);
      usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") join();
      });
      leaveButton.addEventListener("click", async () => {
        sfx.click();
        if (username) {
          await update(playerRef(), { active: false, leftAt: serverTimestamp() });
        }
        username = "";
        localStorage.removeItem("buzzerUsername");
        showLogin();
      });

      onValue(playerRef(), (snapshot) => {
        const player = snapshot.val();
        if (!player) return;
        const score = Number(player.score) || 0;
        playerScore.textContent = `${score} PTS`;
        if (lastRenderedScore !== null && score !== lastRenderedScore) {
          playerScore.classList.remove("bump");
          void playerScore.offsetWidth;
          playerScore.classList.add("bump");
        }
        lastRenderedScore = score;
        if (username && player.active === false && player.removedAt) {
          username = "";
          localStorage.removeItem("buzzerUsername");
          sfx.blocked();
          showLogin("El moderador te ha eliminado. Puedes entrar de nuevo.");
        }
      });

      onValue(ref(db, `rooms/${ROOM_ID}/participants`), (snapshot) => {
        const ranking = [];
        snapshot.forEach((child) => {
          const player = child.val();
          if (player?.active) ranking.push({ ...player, id: child.key });
        });

        ranking.sort((a, b) => {
          return (Number(b.score) || 0) - (Number(a.score) || 0) || String(a.name || "").localeCompare(String(b.name || ""));
        });

        const rankIndex = ranking.findIndex((player) => player.id === playerId);
        playerRank.textContent = rankIndex >= 0 ? `#${rankIndex + 1}` : "#-";
      });

      onValue(ref(db, `rooms/${ROOM_ID}/status`), (snapshot) => {
        const status = snapshot.val();
        if (status === "lobby" || status === "results") {
          waitingPanel.classList.remove("hidden");
          questionPanel.classList.add("hidden");
          finishedPanel.classList.add("hidden");
        }
        if (status === "finished") {
          waitingPanel.classList.add("hidden");
          questionPanel.classList.add("hidden");
          finishedPanel.classList.remove("hidden");
          sfx.finish();
        }
      });

      onValue(ref(db, `rooms/${ROOM_ID}/currentQuestion`), (snapshot) => {
        const question = snapshot.val();
        if (question && question.id !== activeQuestionId) {
          renderQuestion(question);
        }
      });

      if (username) {
        usernameInput.value = username;
        join();
      }

      const canvas = document.querySelector("#matrix");
      const ctx = canvas.getContext("2d");
      const glyphs = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&/<>[]{}";
      let drops = [];

      function resizeMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.ceil(canvas.width / 18)).fill(0).map(() => Math.random() * -80);
      }

      function drawMatrix() {
        const feedback = matrixFeedback && matrixFeedback.until > Date.now() ? matrixFeedback.type : null;
        const wrongBlink = feedback === "wrong" && Math.floor(Date.now() / 145) % 2 === 0;
        const bgFade = feedback === "correct"
          ? "rgba(0, 18, 44, 0.08)"
          : feedback === "wrong"
            ? (wrongBlink ? "rgba(66, 0, 14, 0.08)" : "rgba(18, 0, 5, 0.16)")
            : "rgba(2, 6, 4, 0.14)";
        const glyphColor = feedback === "correct"
          ? "#20e3ff"
          : feedback === "wrong"
            ? (wrongBlink ? "#ff3864" : "#ff9aaa")
            : "#39ff88";

        if (matrixFeedback && matrixFeedback.until <= Date.now()) {
          matrixFeedback = null;
        }

        ctx.fillStyle = bgFade;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = glyphColor;
        ctx.shadowBlur = feedback === "correct" ? 12 : feedback === "wrong" ? (wrongBlink ? 18 : 4) : 0;
        ctx.shadowColor = glyphColor;
        ctx.font = feedback ? "bold 22px Courier New" : "18px Courier New";
        drops.forEach((drop, index) => {
          const char = glyphs[Math.floor(Math.random() * glyphs.length)];
          ctx.fillText(char, index * 18, drop * 18);
          drops[index] = drop * 18 > canvas.height && Math.random() > 0.975 ? 0 : drop + 1;
        });
        ctx.shadowBlur = 0;
        requestAnimationFrame(drawMatrix);
      }

      window.addEventListener("resize", resizeMatrix);
      resizeMatrix();
      drawMatrix();
    </script>
  </body>
</html>
