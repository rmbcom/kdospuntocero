<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pulsador Kahoot</title>
    <style>
      :root {
        --bg: #020604;
        --panel: rgba(3, 18, 12, 0.9);
        --green: #39ff88;
        --cyan: #20e3ff;
        --amber: #ffd166;
        --red: #ff3864;
        --ink: #d9ffe7;
        --muted: #82b69a;
        --line: rgba(57, 255, 136, 0.32);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Courier New", Consolas, monospace;
        background: var(--bg);
        overflow-x: hidden;
      }

      #matrix {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.22;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: screen;
      }

      main {
        position: relative;
        z-index: 2;
        width: min(920px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        place-items: center;
      }

      .panel {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(18px, 4vw, 34px);
        background: var(--panel);
        box-shadow: 0 0 36px rgba(57, 255, 136, 0.16), inset 0 0 28px rgba(57, 255, 136, 0.08);
      }

      .hidden { display: none !important; }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1, h2, p { margin-top: 0; }

      h1 {
        margin-bottom: 12px;
        color: var(--green);
        font-size: clamp(2.4rem, 9vw, 5.5rem);
        line-height: 0.9;
        text-shadow: 0 0 14px rgba(57, 255, 136, 0.5);
      }

      h2 {
        color: white;
        font-size: clamp(1.55rem, 5vw, 3rem);
        line-height: 1.08;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-weight: 900;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 15px;
        color: var(--green);
        background: #020b07;
        font: inherit;
        font-size: 1.25rem;
        font-weight: 900;
        outline: none;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 18px;
        color: var(--ink);
        background: rgba(57, 255, 136, 0.14);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
      }

      button:hover { transform: translateY(-2px); box-shadow: 0 0 18px rgba(57, 255, 136, 0.24); }
      button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

      .primary {
        width: 100%;
        margin-top: 16px;
        color: #001b0b;
        background: var(--green);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 22px;
      }

      .score {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--amber);
        background: rgba(255, 209, 102, 0.08);
        font-size: 1.25rem;
        font-weight: 900;
        white-space: nowrap;
      }

      .status {
        min-height: 1.5em;
        color: var(--cyan);
        font-weight: 900;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .option {
        min-height: 96px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: white;
        text-align: left;
        font-size: clamp(1rem, 2.8vw, 1.24rem);
      }

      .option strong {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        color: #001b0b;
        background: white;
      }

      .a { background: rgba(255, 56, 100, 0.7); }
      .b { background: rgba(32, 227, 255, 0.62); }
      .c { background: rgba(255, 209, 102, 0.72); color: #101510; }
      .d { background: rgba(57, 255, 136, 0.54); }

      .selected {
        outline: 4px solid white;
        box-shadow: 0 0 28px rgba(255, 255, 255, 0.22);
      }

      .terminal {
        border-top: 1px dashed var(--line);
        margin-top: 20px;
        padding-top: 14px;
        color: var(--muted);
        font-weight: 800;
      }

      @media (max-width: 680px) {
        .options { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <canvas id="matrix"></canvas>

    <main>
      <section id="loginView" class="panel">
        <p class="eyebrow">SISTEMA DE CONCURSO ACTIVO</p>
        <h1>ACCESO</h1>
        <label>
          IDENTIFICADOR DE PARTICIPANTE
          <input id="usernameInput" maxlength="40" placeholder="Escribe tu nombre">
        </label>
        <button id="enterButton" class="primary">ENTRAR AL SISTEMA</button>
        <p id="loginError" class="status"></p>
      </section>

      <section id="gameView" class="panel hidden">
        <div class="topbar">
          <div>
            <p class="eyebrow" id="playerName">PARTICIPANTE</p>
            <h1 style="font-size: clamp(2rem, 7vw, 4rem)">QUIZ_MODE</h1>
          </div>
          <div class="score" id="playerScore">0 PTS</div>
        </div>

        <section id="waitingPanel">
          <h2>ESPERANDO PREGUNTA...</h2>
          <p class="terminal">El moderador controla el flujo de la partida.</p>
        </section>

        <section id="questionPanel" class="hidden">
          <p class="eyebrow" id="questionMeta">PREGUNTA</p>
          <h2 id="questionText"></h2>
          <div class="options" id="options"></div>
          <p class="terminal" id="answerStatus">Selecciona una respuesta.</p>
        </section>

        <section id="finishedPanel" class="hidden">
          <h2>RANKING FINAL EN PANTALLA DEL MODERADOR</h2>
          <p class="terminal">Partida finalizada. Espera nuevas instrucciones.</p>
        </section>

        <button id="leaveButton" style="margin-top: 20px">SALIR / CAMBIAR NOMBRE</button>
      </section>
    </main>

    <script src="./questions.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        update,
        serverTimestamp,
        onDisconnect,
        onValue,
        get,
        runTransaction
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDWvS8aYd7tx3pc2kxZewJVlXH5xIPAgHM",
        authDomain: "pulsadorconcurso.firebaseapp.com",
        databaseURL: "https://pulsadorconcurso-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "pulsadorconcurso",
        storageBucket: "pulsadorconcurso.firebasestorage.app",
        messagingSenderId: "124348060991",
        appId: "1:124348060991:web:6dd54bbe290b1bfa61ef8a"
      };

      const ROOM_ID = "principal";
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const loginView = document.querySelector("#loginView");
      const gameView = document.querySelector("#gameView");
      const usernameInput = document.querySelector("#usernameInput");
      const enterButton = document.querySelector("#enterButton");
      const loginError = document.querySelector("#loginError");
      const playerName = document.querySelector("#playerName");
      const playerScore = document.querySelector("#playerScore");
      const waitingPanel = document.querySelector("#waitingPanel");
      const questionPanel = document.querySelector("#questionPanel");
      const finishedPanel = document.querySelector("#finishedPanel");
      const questionMeta = document.querySelector("#questionMeta");
      const questionText = document.querySelector("#questionText");
      const options = document.querySelector("#options");
      const answerStatus = document.querySelector("#answerStatus");
      const leaveButton = document.querySelector("#leaveButton");

      let username = localStorage.getItem("buzzerUsername") || "";
      let playerId = localStorage.getItem("buzzerPlayerId") || crypto.randomUUID();
      let activeQuestionId = null;
      let currentQuestion = null;
      localStorage.setItem("buzzerPlayerId", playerId);

      function playerRef() {
        return ref(db, `rooms/${ROOM_ID}/participants/${playerId}`);
      }

      function showGame() {
        loginView.classList.add("hidden");
        gameView.classList.remove("hidden");
        playerName.textContent = `USER: ${username}`;
      }

      function showLogin(message = "") {
        gameView.classList.add("hidden");
        loginView.classList.remove("hidden");
        usernameInput.value = "";
        loginError.textContent = message;
      }

      async function join() {
        username = usernameInput.value.trim();
        if (!username) {
          loginError.textContent = "Escribe un nombre.";
          return;
        }

        const previousPlayer = (await get(playerRef())).val();
        localStorage.setItem("buzzerUsername", username);

        await set(playerRef(), {
          id: playerId,
          name: username,
          active: true,
          score: Number(previousPlayer?.score) || 0,
          joinedAt: serverTimestamp(),
          lastSeenAt: serverTimestamp()
        });

        onDisconnect(playerRef()).update({
          active: false,
          leftAt: serverTimestamp()
        });

        showGame();
      }

      function renderQuestion(question) {
        currentQuestion = question;
        activeQuestionId = question.id;
        waitingPanel.classList.add("hidden");
        finishedPanel.classList.add("hidden");
        questionPanel.classList.remove("hidden");
        questionMeta.textContent = `PREGUNTA ${question.index + 1}`;
        questionText.textContent = question.pregunta;
        answerStatus.textContent = "Selecciona una respuesta.";

        options.innerHTML = question.options.map((option) => `
          <button class="option ${option.key.toLowerCase()}" data-key="${option.key}">
            <strong>${option.key}</strong>
            <span>${option.text}</span>
          </button>
        `).join("");

        get(ref(db, `rooms/${ROOM_ID}/answers/${question.id}/${playerId}`)).then((snapshot) => {
          if (snapshot.exists()) {
            lockOptions(snapshot.val().optionKey);
            answerStatus.textContent = "RESPUESTA ENVIADA";
          }
        });
      }

      function lockOptions(selectedKey) {
        document.querySelectorAll(".option").forEach((button) => {
          button.disabled = true;
          button.classList.toggle("selected", button.dataset.key === selectedKey);
        });
      }

      async function answer(optionKey) {
        if (!currentQuestion || !username) return;
        const answerRef = ref(db, `rooms/${ROOM_ID}/answers/${currentQuestion.id}/${playerId}`);
        const answeredAt = Date.now();
        const result = await runTransaction(answerRef, (currentValue) => {
          if (currentValue !== null) return;
          return {
            playerId,
            name: username,
            optionKey,
            answeredAt
          };
        });

        if (result.committed) {
          lockOptions(optionKey);
          answerStatus.textContent = "RESPUESTA ENVIADA";
        } else {
          answerStatus.textContent = "YA HABIAS RESPONDIDO";
        }
      }

      options.addEventListener("click", (event) => {
        const button = event.target.closest("[data-key]");
        if (button) answer(button.dataset.key);
      });

      enterButton.addEventListener("click", join);
      usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") join();
      });
      leaveButton.addEventListener("click", async () => {
        if (username) {
          await update(playerRef(), { active: false, leftAt: serverTimestamp() });
        }
        username = "";
        localStorage.removeItem("buzzerUsername");
        showLogin();
      });

      onValue(playerRef(), (snapshot) => {
        const player = snapshot.val();
        if (!player) return;
        playerScore.textContent = `${player.score || 0} PTS`;
        if (username && player.active === false && player.removedAt) {
          username = "";
          localStorage.removeItem("buzzerUsername");
          showLogin("El moderador te ha eliminado. Puedes entrar de nuevo.");
        }
      });

      onValue(ref(db, `rooms/${ROOM_ID}/status`), (snapshot) => {
        const status = snapshot.val();
        if (status === "lobby" || status === "results") {
          waitingPanel.classList.remove("hidden");
          questionPanel.classList.add("hidden");
          finishedPanel.classList.add("hidden");
        }
        if (status === "finished") {
          waitingPanel.classList.add("hidden");
          questionPanel.classList.add("hidden");
          finishedPanel.classList.remove("hidden");
        }
      });

      onValue(ref(db, `rooms/${ROOM_ID}/currentQuestion`), (snapshot) => {
        const question = snapshot.val();
        if (question && question.id !== activeQuestionId) {
          renderQuestion(question);
        }
      });

      if (username) {
        usernameInput.value = username;
        join();
      }

      const canvas = document.querySelector("#matrix");
      const ctx = canvas.getContext("2d");
      const glyphs = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&/<>[]{}";
      let drops = [];

      function resizeMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.ceil(canvas.width / 18)).fill(0).map(() => Math.random() * -80);
      }

      function drawMatrix() {
        ctx.fillStyle = "rgba(2, 6, 4, 0.14)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#39ff88";
        ctx.font = "18px Courier New";
        drops.forEach((drop, index) => {
          const char = glyphs[Math.floor(Math.random() * glyphs.length)];
          ctx.fillText(char, index * 18, drop * 18);
          drops[index] = drop * 18 > canvas.height && Math.random() > 0.975 ? 0 : drop + 1;
        });
        requestAnimationFrame(drawMatrix);
      }

      window.addEventListener("resize", resizeMatrix);
      resizeMatrix();
      drawMatrix();
    </script>
  </body>
</html>
